<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepMedic</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Vis.js -->
  <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar glass-panel">
      <div class="sidebar-header">
        <div class="logo-box">
          <i class="fa-solid fa-brain"></i>
        </div>
        <h1>DeepMedic</h1>
        <p>Mapeamento de Diagnósticos</p>
      </div>
      
      <div class="search-container">
        <i class="fa-solid fa-search search-icon"></i>
        <input type="text" id="searchInput" placeholder="Buscar sinal ou doença...">
      </div>

      <div class="filters">
        <h3>Modo de Visualização</h3>
        <div class="filter-toggles">
          <button class="toggle-btn active" data-filter="all"><i class="fa-solid fa-globe"></i> Todos</button>
          <button class="toggle-btn" data-filter="disease"><i class="fa-solid fa-virus"></i> Doenças</button>
          <button class="toggle-btn" data-filter="symptom"><i class="fa-solid fa-stethoscope"></i> Sintomas</button>
        </div>
        
        <div class="legend">
          <div class="legend-item">
            <span class="color-dot disease-dot"></span> Doença / Complicação
          </div>
          <div class="legend-item">
            <span class="color-dot symptom-dot"></span> Achado / Sinal Clínico
          </div>
        </div>
      </div>
      
      <!-- Info Panel for Selected Node -->
      <div id="infoPanel" class="info-panel hidden">
        <h2 id="infoTitle">Nome do Nó</h2>
        <span id="infoType" class="badge">Tipo</span>
        <div class="info-content">
          <h3>Conexões Relacionadas:</h3>
          <ul id="infoConnections"></ul>
        </div>
        <button id="resetViewBtn" class="action-btn"><i class="fa-solid fa-rotate-left"></i> Restaurar Visão</button>
      </div>
    </aside>

    <!-- Main Network Area -->
    <main class="network-container">
      <div id="loading" class="loading-overlay glass-panel">
        <div class="spinner"></div>
        <p>Processando conexões neurais...</p>
      </div>
      <div id="networkMap"></div>
      
      <div class="map-controls glass-panel">
        <button id="zoomIn" title="Aumentar Zoom"><i class="fa-solid fa-plus"></i></button>
        <button id="zoomOut" title="Diminuir Zoom"><i class="fa-solid fa-minus"></i></button>
        <button id="fitView" title="Ajustar à Tela"><i class="fa-solid fa-expand"></i></button>
      </div>

      <!-- Guided Navigation Panel -->
      <div class="guided-nav glass-panel">
        <button id="prevDiseaseBtn" class="nav-btn" title="Doença Anterior"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="nav-info">
          <span id="navDiseaseName">Navegação Guiada</span>
          <span id="navCounter">- / -</span>
        </div>
        <button id="nextDiseaseBtn" class="nav-btn" title="Próxima Doença"><i class="fa-solid fa-chevron-right"></i></button>
      </div>
    </main>
  </div>

  <!-- Data and Application Script -->
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
